<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULTIMATE CALCULATOR 3000</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Theme Toggle -->
    <div class="theme-toggle">
        <button id="themeToggle">🌙 Dark Mode</button>
    </div>

    <!-- Main Container -->
    <div class="calculator-container">
        <!-- Calculator Header -->
        <div class="calculator-header">
            <div class="mode-indicator">
                <span id="currentMode">Standard</span>
                <button id="scientificToggle" class="mode-btn">🔬 Scientific</button>
            </div>
            <div class="display-container">
                <div class="display-history" id="history"></div>
                <input type="text" id="display" readonly placeholder="0">
                <div class="display-expression" id="expression"></div>
            </div>
            <div class="memory-indicator" id="memoryIndicator">Memory: 0</div>
        </div>

        <!-- Memory Panel -->
        <div class="memory-panel">
            <button class="memory-btn" onclick="memoryClear()">MC</button>
            <button class="memory-btn" onclick="memoryRecall()">MR</button>
            <button class="memory-btn" onclick="memoryAdd()">M+</button>
            <button class="memory-btn" onclick="memorySubtract()">M-</button>
        </div>

        <!-- Scientific Panel (Initially Hidden) -->
        <div class="scientific-panel" id="scientificPanel" style="display: none;">
            <button class="sci-btn" onclick="appendFunction('sin(')">sin</button>
            <button class="sci-btn" onclick="appendFunction('cos(')">cos</button>
            <button class="sci-btn" onclick="appendFunction('tan(')">tan</button>
            <button class="sci-btn" onclick="appendFunction('log(')">log</button>
            <button class="sci-btn" onclick="appendFunction('ln(')">ln</button>
            <button class="sci-btn" onclick="appendFunction('√(')">√</button>
            <button class="sci-btn" onclick="appendFunction('^')">xʸ</button>
            <button class="sci-btn" onclick="appendFunction('!')">x!</button>
            <button class="sci-btn" onclick="appendConstant('π')">π</button>
            <button class="sci-btn" onclick="appendConstant('e')">e</button>
            <button class="sci-btn" onclick="reciprocal()">1/x</button>
            <button class="sci-btn" onclick="square()">x²</button>
            <button class="sci-btn" onclick="cube()">x³</button>
            <button class="sci-btn" onclick="tenPower()">10^x</button>
            <button class="sci-btn" onclick="expFunction()">e^x</button>
            <button class="sci-btn" onclick="randomNumber()">Rand</button>
        </div>

        <!-- Unit Converter Panel -->
        <div class="converter-panel" id="converterPanel" style="display: none;">
            <select id="converterType">
                <option value="length">Length</option>
                <option value="weight">Weight</option>
                <option value="temperature">Temperature</option>
                <option value="currency">Currency</option>
            </select>
            <input type="number" id="converterInput" placeholder="Enter value">
            <select id="converterFrom"></select>
            <span>→</span>
            <select id="converterTo"></select>
            <button onclick="convert()">Convert</button>
            <div id="converterResult"></div>
        </div>

        <!-- Main Keypad -->
        <div class="buttons">
            <button class="btn function" onclick="clearAll()">AC</button>
            <button class="btn function" onclick="deleteLast()">⌫</button>
            <button class="btn function" onclick="toggleSign()">±</button>
            <button class="btn operator" onclick="appendOperator('/')">÷</button>

            <button class="btn" onclick="appendNumber('7')">7</button>
            <button class="btn" onclick="appendNumber('8')">8</button>
            <button class="btn" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="appendOperator('*')">×</button>

            <button class="btn" onclick="appendNumber('4')">4</button>
            <button class="btn" onclick="appendNumber('5')">5</button>
            <button class="btn" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="appendOperator('-')">−</button>

            <button class="btn" onclick="appendNumber('1')">1</button>
            <button class="btn" onclick="appendNumber('2')">2</button>
            <button class="btn" onclick="appendNumber('3')">3</button>
            <button class="btn operator" onclick="appendOperator('+')">+</button>

            <button class="btn zero" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
            <button class="btn" onclick="appendOperator('(')">(</button>
            <button class="btn" onclick="appendOperator(')')">)</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>

        <!-- History Panel -->
        <div class="history-panel" id="historyPanel">
            <h3>History <button onclick="clearHistory()">Clear</button></h3>
            <ul id="historyList"></ul>
        </div>

        <!-- Extra Tools -->
        <div class="extra-tools">
            <button onclick="copyResult()">📋 Copy</button>
            <button onclick="pasteValue()">📌 Paste</button>
            <button onclick="roundResult()">Round</button>
            <button onclick="floorResult()">Floor</button>
            <button onclick="ceilResult()">Ceil</button>
            <button onclick="toggleConverter()">🔄 Converter</button>
            <button onclick="toggleSound()">🔊 Sound</button>
            <button onclick="randomNumber()">🎲 Random</button>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>ULTIMATE CALCULATOR 3000 | Built by MCA Pro 🚀</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
